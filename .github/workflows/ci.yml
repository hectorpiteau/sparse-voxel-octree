name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  UV_CACHE_DIR: /tmp/uv-cache

jobs:
  lint:
    name: Ruff lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Run Ruff
        run: uv run --extra lint ruff check .

  python-tests:
    name: Python tests ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Run Python tests
        run: uv run --extra test python -m pytest tests/python -q

  cmake-cpu:
    name: CMake CPU tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Configure
        run: cmake -S . -B build-cpu -DSVO_ENABLE_CUDA=OFF -DSVO_BUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build-cpu --config Release -j2
      - name: Test
        run: ctest --test-dir build-cpu --output-on-failure

  package:
    name: Build package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Build wheel and sdist
        run: uv build
      - name: Check package artifacts
        run: uv run python scripts/check_package.py
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: sparse-voxel-octree-dist
          path: dist/*
